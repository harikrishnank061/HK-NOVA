<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK NOVA</title>
    <meta name="description" content="A premium, interactive particle atmosphere designed for focus and relaxation. Experience the HK NOVA.">
    
    <!-- Open Graph / SEO -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="HK NOVA - Ethereal Silence">
    <meta property="og:description" content="Experience a calm, interactive particle world. Weave light into darkness.">
    <meta property="og:image" content="HK.png">

    <link rel="icon" type="image/png" href="HK.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Space+Grotesk:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loader-wrapper">
        <div class="loader-content">
            <div class="loader-logo-container">
                <img src="HK.png" alt="HK Logo" class="loader-logo">
                <div class="loader-pulse"></div>
            </div>
            <div class="loader-text">INITIALIZING HK NOVA</div>
        </div>
    </div>

    <div id="header-logo">
        <img src="HK.png" alt="HK Logo">
        <span class="brand-name">HK NOVA</span>
    </div>


    <div id="settings-hint">
        Explore Design & Dynamics
    </div>

    <button id="menu-toggle" title="Settings">
        <svg viewBox="0 0 24 24" width="24" height="24">
            <path d="M12,15.5A3.5,3.5 0 0,1 8.5,12A3.5,3.5 0 0,1 12,8.5A3.5,3.5 0 0,1 15.5,12A3.5,3.5 0 0,1 12,15.5M19.43,12.97C19.47,12.65 19.5,12.33 19.5,12C19.5,11.67 19.47,11.35 19.43,11.03L21.54,9.37C21.73,9.22 21.78,8.95 21.66,8.73L19.66,5.27C19.54,5.05 19.27,4.97 19.05,5.05L16.56,6.05C16.04,5.65 15.48,5.32 14.87,5.07L14.5,2.42C14.46,2.18 14.25,2 14,2H10C9.75,2 9.54,2.18 9.5,2.42L9.13,5.07C8.52,5.32 7.96,5.65 7.44,6.05L4.95,5.05C4.73,4.97 4.46,5.05 4.34,5.27L2.34,8.73C2.21,8.95 2.27,9.22 2.46,9.37L4.57,11.03C4.53,11.35 4.5,11.67 4.5,12C4.5,12.33 4.53,12.65 4.57,12.97L2.46,14.63C2.27,14.78 2.21,15.05 2.34,15.27L4.34,18.73C4.46,18.95 4.73,19.03 4.95,18.95L7.44,17.95C7.96,18.35 8.52,18.68 9.13,18.93L9.5,21.58C9.54,21.82 9.75,22 10,22H14C14.25,22 14.46,21.82 14.5,21.58L14.87,18.93C15.48,18.68 16.04,18.35 16.56,17.95L19.05,18.95C19.27,19.03 19.54,18.95 19.66,18.73L21.66,15.27C21.78,15.05 21.73,14.78 21.54,14.63L19.43,12.97Z" fill="white"/>
        </svg>
    </button>

    <div id="settings-panel">
        <h3>Design System</h3>
        <p>Customize your constellations</p>
        
        <div class="section-title">Aesthetics</div>
        <div class="options themes">
            <button class="theme-btn active" data-theme="neon">Neon Cyan</button>
            <button class="theme-btn" data-theme="solar">Solar Gold</button>
            <button class="theme-btn" data-theme="aurora">Aurora Green</button>
        </div>

        <div class="section-title">Collection</div>
        <div class="options symbols">
            <button class="option-btn active" data-shape="all">Mosaic (Mix)</button>
            <button class="option-btn" data-shape="0">Circles</button>
            <button class="option-btn" data-shape="1">Plus Signs</button>
            <button class="option-btn" data-shape="2">Diamonds</button>
            <button class="option-btn" data-shape="3">Stars</button>
        </div>

        <div class="section-title">Dynamics</div>
        <div class="control-group">
            <label>Drift Speed</label>
            <input type="range" id="speed-range" min="0.5" max="5" step="0.1" value="1.5">
        </div>

        <div class="control-group" style="margin-top: 15px;">
            <label class="switch-container">
                Magnetic Attraction
                <input type="checkbox" id="magnet-toggle">
                <span class="checkmark"></span>
            </label>
        </div>
        
        <hr>
        <div class="footer">
            <p>Click anywhere to create more</p>
        </div>
    </div>

    <div id="metrics-hud">
        <div class="metric">Nodes: <span id="node-count">0</span></div>
        <div class="metric">Flux: <span id="flux-speed">0</span></div>
    </div>



    <canvas id="particleCanvas"></canvas>
    
    <div class="content-overlay">
        <h1 id="main-title">HK NOVA</h1>
        <p class="subtitle">Where the noise ends and your calm begins.</p>
        <p class="instructions">Click to weave light into the darkness. ✨</p>
    </div>


    <script src="script.js"></script>
</body>
</html>
